<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#16121f" />
  <title>Doomlings Scorer</title>

  <!-- PWA / iOS Add-to-Home-Screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Doomlings" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="top">
      <h1>Doomlings <span class="em">Scorer</span></h1>
    </header>
    <main id="app"><p class="hint">Loading cards…</p></main>
  </div>

  <!-- order matters: effects -> scoring -> data -> app -->
  <script src="js/effects.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
